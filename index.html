<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Association of Atlanta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #fff;
            color: #202124;
        }

        .search-container {
            max-width: 600px;
            margin: 100px auto 50px;
            text-align: center;
        }

        .search-title {
            font-size: 72px;
            font-weight: 300;
            margin-bottom: 30px;
            color: #4285f4;
        }

        .search-box {
            display: flex;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 10px 20px;
            width: 100%;
            transition: box-shadow 0.2s;
        }

        .search-box:hover {
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 5px 10px;
        }

        .search-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }

        .results-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .result-item {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e8e8e8;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-title {
            font-size: 18px;
            color: #1a0dab;
            text-decoration: none;
            cursor: pointer;
            display: block;
            margin-bottom: 5px;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-url {
            font-size: 13px;
            color: #006621;
            margin-bottom: 8px;
        }

        .result-description {
            font-size: 14px;
            color: #4d5156;
            line-height: 1.6;
        }

        .result-meta {
            font-size: 12px;
            color: #70757a;
            margin-top: 5px;
        }

        .no-results {
            text-align: center;
            color: #70757a;
            margin-top: 50px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="search-title">KAA</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search events and resources..." autofocus>
            <button class="search-button">⌕</button>
        </div>
    </div>

    <div class="results-container" id="resultsContainer"></div>

    <script>
        const content = [
            {
                title: "Chuseok celebration and family gathering",
                category: "Events",
                description: "Join our annual Chuseok festival celebrating Korean harvest traditions. Food, games, and cultural performances.",
                replies: 87
            },
            {
                title: "Korean language classes for children",
                category: "Education",
                description: "Weekly classes teaching Korean language and cultural heritage to second-generation children.",
                replies: 56
            },
            {
                title: "Business networking meetup",
                category: "Networking",
                description: "Monthly gathering for Korean business professionals in Atlanta to connect and share opportunities.",
                replies: 34
            },
            {
                title: "Korean food festival in Buford Highway",
                category: "Culture",
                description: "Celebrating authentic Korean cuisine with local restaurants and cultural demonstrations.",
                replies: 102
            },
            {
                title: "Immigration and citizenship resources",
                category: "Resources",
                description: "Information and support for immigration matters, citizenship applications, and legal resources.",
                replies: 28
            },
            {
                title: "Youth sports leagues and activities",
                category: "Youth",
                description: "Soccer, badminton, and other sports programs for Korean youth in the Atlanta area.",
                replies: 45
            },
            {
                title: "Alumni network and mentorship program",
                category: "Mentoring",
                description: "Connecting professionals and students for career guidance and mentorship opportunities.",
                replies: 31
            }
        ];

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');

        function renderResults(query) {
            resultsContainer.innerHTML = '';

            if (!query.trim()) {
                return;
            }

            const filtered = content.filter(item =>
                item.title.toLowerCase().includes(query.toLowerCase()) ||
                item.description.toLowerCase().includes(query.toLowerCase()) ||
                item.category.toLowerCase().includes(query.toLowerCase())
            );

            if (filtered.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">No results found</div>';
                return;
            }

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
                    <a class="result-title">${item.title}</a>
                    <div class="result-url">kaa-atlanta.org › ${item.category.toLowerCase()}</div>
                    <div class="result-description">${item.description}</div>
                    <div class="result-meta">${item.replies} replies</div>
                `;
                resultsContainer.appendChild(div);
            });
        }

        searchInput.addEventListener('input', (e) => {
            renderResults(e.target.value);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
